spring.application.name=Integration-project

# Datasource: usar exclusivamente variables de entorno (DB_URL, DB_USERNAME, DB_PASSWORD)
# No hay valores por defecto; si no est·n definidas, Spring fallar· al iniciar y te obligar· a proveerlas.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
# driver por defecto (usar org.postgresql.Driver para Neon/Postgres) - configurado directamente
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

server.port=${PORT:8080}

# Mail properties - allow empty defaults so app can start when env vars are not defined
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_SMTP_SSL_TRUST:smtp.gmail.com}

# JWT properties (development default). In production override JWT_SECRET env var.
jwt.secret=${JWT_SECRET:dev-default-insecure-secret-change_me}
jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:900}
jwt.issuer=${JWT_ISSUER:integration-project}

# SMTP default values to avoid placeholder resolution failures
# (keep empty host by default to disable mail auto-configuration when not configured)
